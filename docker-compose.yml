services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: teams
      POSTGRES_PASSWORD: teams
      POSTGRES_DB: teams_alert_inbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teams -d teams_alert_inbox"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
